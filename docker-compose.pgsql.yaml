services:
  pgsql:
    image: postgres:16-alpine
    container_name: pgsql
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openjob
    ports:
      - "5432:5432"
    volumes:
      - pgsql_openjob_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openjob"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgsql_openjob_data: